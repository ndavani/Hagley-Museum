<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CHANGE: Update page title to match your exhibit name -->
  <title>Eagle Roll Mill Turbine — Hagley Museum & Library</title>

  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:     #1e3a5f;
      --steel:    #3a6186;
      --powder:   #deeaf4;
      --light-bg: #eaf3f9;
      --white:    #ffffff;
    }

    body {
      background: var(--light-bg);
      color: var(--navy);
      font-family: "Source Sans 3", sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 64px;
    }

    .intro-rule {
      width: 3px;
      height: 52px;
      background: linear-gradient(to bottom, transparent, var(--steel), transparent);
      margin-bottom: 2rem;
      border-radius: 2px;
    }

    .intro-label {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--steel);
      margin-bottom: 1rem;
    }

    h1 {
      font-family: "EB Garamond", serif;
      font-size: clamp(2rem, 8vw, 3.2rem);
      font-weight: 600;
      line-height: 1.15;
      text-align: center;
      color: var(--navy);
      margin-bottom: 0.5rem;
    }

    .intro-divider {
      width: 40px;
      height: 2px;
      background: var(--steel);
      margin: 1.5rem 0;
      border-radius: 1px;
    }

    .intro-sub {
      font-size: 16px;
      letter-spacing: 0.02em;
      color: var(--steel);
      text-align: center;
      margin-bottom: 2.5rem;
      line-height: 1.7;
      max-width: 480px;
    }

    .video-card {
      width: 100%;
      max-width: 860px;
      background: var(--navy);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(30, 58, 95, 0.2);
    }

    .video-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      overflow: hidden;
    }
    .video-wrap img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .video-card:hover .video-wrap img { transform: scale(1.03); }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(15, 30, 55, 0.35);
      transition: background 0.3s;
    }
    .video-card:hover .play-overlay { background: rgba(15, 30, 55, 0.55); }

    .play-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
    }
    .video-card:hover .play-btn { transform: scale(1.08); background: #fff; }
    .play-btn svg { width: 26px; height: 26px; fill: #cc0000; margin-left: 3px; }

    .play-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(222,234,244,0.85);
    }

    .video-toolbar {
      padding: 11px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      border-top: 1px solid rgba(222,234,244,0.08);
    }

    .toolbar-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(222,234,244,0.4);
    }
    .toolbar-label svg { width: 13px; height: 13px; }

    .yt-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 16px;
      border: 1px solid rgba(222,234,244,0.3);
      border-radius: 3px;
      color: rgba(222,234,244,0.6);
      text-decoration: none;
      font-family: "Source Sans 3", sans-serif;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .yt-link:hover { background: #cc0000; border-color: #cc0000; color: var(--white); }
    .yt-link svg { width: 12px; height: 12px; fill: currentColor; }
  </style>
</head>
<body>

  <div class="intro-rule"></div>

  <!-- CHANGE: Museum or institution name shown at the top of the page -->
  <p class="intro-label">Hagley Museum &amp; Library</p>

  <!-- CHANGE: Main exhibit title shown large on the page -->
  <h1>Eagle Roll Mill Turbine</h1>

  <div class="intro-divider"></div>

  <!-- CHANGE: Short description shown below the title -->
  <p class="intro-sub">A 360° tour of the Eagle Roll Mill Turbine. Tap the thumbnail to watch the full experience on YouTube.</p>

  <!-- CHANGE: Update the href to your YouTube video URL
               e.g. href="https://www.youtube.com/watch?v=YOUR_VIDEO_ID" -->
  <a class="video-card" href="https://www.youtube.com/watch?v=yqLuimEJJoc" target="_blank" rel="noopener noreferrer" style="text-decoration:none; display:block;">
    <div class="video-wrap">

      <!-- CHANGE: Update both instances of the video ID in this src URL
                   Replace yqLuimEJJoc with your YouTube video ID
                   The video ID is the part after ?v= in the YouTube URL -->
      <img
        id="yt-thumb"
        src="https://img.youtube.com/vi/yqLuimEJJoc/hqdefault.jpg"
        alt="Eagle Roll Mill Turbine — 360° Tour"
      />

      <div class="play-overlay">
        <div class="play-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </div>

        <!-- CHANGE: Update this label to describe your video type e.g. "Watch Video" or "360° Tour" -->
        <span class="play-label">Watch on YouTube · 360°</span>

      </div>
    </div>
    <div class="video-toolbar">

      <!-- CHANGE: Update this label to describe the type of content e.g. "Historic Tour" or "360° Exhibit View" -->
      <span class="toolbar-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        360° Exhibit View
      </span>

      <span class="yt-link">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/>
        </svg>
        Watch on YouTube
      </span>

    </div>
  </a>

  <script>
    // CHANGE: Update this to your YouTube video ID (the part after ?v= in the URL)
    // e.g. for https://www.youtube.com/watch?v=ABC123 the ID is ABC123
    const videoId = 'yqLuimEJJoc';
    const thumb = document.getElementById('yt-thumb');

    // Automatically loads the best available thumbnail — no changes needed below
    fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`)
      .then(r => r.json())
      .then(data => {
        if (data.thumbnail_url) {
          const maxres = data.thumbnail_url.replace('hqdefault', 'maxresdefault');
          const testImg = new Image();
          testImg.onload = () => {
            if (testImg.width > 200) thumb.src = maxres;
            else thumb.src = data.thumbnail_url;
          };
          testImg.onerror = () => { thumb.src = data.thumbnail_url; };
          testImg.src = maxres;
        }
      })
      .catch(() => {});
  </script>

  <script>
    /* =========================
       CHANGE: CONFIG
       These are the only values you need to update for a new exhibit
    ========================= */

    // Your Google Apps Script URL — same for all exhibits unless you create a new one
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzm0wgH5Tdlz8KEGJcXRE4jif9Rxn_Ma3Vf_Dn-RhwMbKAT1LnZvLIs0uM1gts01k6rIQ/exec";

    // CHANGE: This is what appears in the "Exhibit Name" column in Airtable — make it unique per exhibit
    const EXHIBIT_NAME = "Eagle Roll Mill Turbine";

    // Your OpenWeather API key — same for all exhibits
    const WEATHER_API_KEY = "e23c0a18cd0744e940f5020207c57793";

    // Museum GPS coordinates — same for all exhibits at Hagley
    const LAT = 39.7496;
    const LON = -75.6206;

    /* =========================
       NO CHANGES NEEDED BELOW THIS LINE
    ========================= */

    function sendScan(weatherType, temperature) {
      const payload = {
        exhibit: EXHIBIT_NAME,
        weather: weatherType,
        temperature: temperature,
        apiKey: "hagley-2026"
      };
      console.log("Sending:", payload);
      fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
    }

    function logScan() {
      const weatherURL =
        `https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&units=imperial&appid=${WEATHER_API_KEY}`;
      fetch(weatherURL)
        .then(response => {
          if (!response.ok) throw new Error("Weather request failed with status " + response.status);
          return response.json();
        })
        .then(data => {
          if (!data.main || !data.weather || !data.weather.length) throw new Error("Weather response missing fields");
          const temperature = Math.round(data.main.temp) + "°F";
          const weatherType = data.weather[0].description;
          sendScan(weatherType, temperature);
        })
        .catch(error => {
          console.error("Weather error:", error);
          sendScan("WEATHER_ERROR", "-1°F");
        });
    }

    logScan();
  </script>
</body>
</html>
